  HOW TO EDIT THIS PAGE (plain HTML, no build step)

<!-- HEADER / NAV (same on every page) -->
<header style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(244,239,228,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #E1D8C6;">
  <div style="max-width:1140px;margin:0 auto;padding:0 40px;height:66px;display:flex;align-items:center;justify-content:space-between;">
    <a href="/" style="font-family:'Source Serif 4',serif;font-weight:900;font-size:20px;letter-spacing:-0.02em;color:#122231;">Jesse Livingston</a>
    <nav id="navlinks" style="display:flex;align-items:center;gap:30px;font-size:14.5px;color:#34424B;">
      <a class="nl" href="/#about">About</a>
      <a class="nl" href="/experience.html">Experience</a>
      <a class="nl" href="/portfolio.html">Portfolio</a>
      <a class="nl" href="/services.html">Services</a>
      <a class="btn-d" href="/contact.html" style="background:#0d2a24;color:#EDE7DA;padding:9px 18px;border-radius:999px;font-weight:500;">Get in touch</a>
    </nav>
  </div>
</header>

<!-- CONTACT -->
<section id="contact" style="padding:150px 40px 110px;background:#123A33;color:#EDE7DA;position:relative;overflow:hidden;min-height:calc(100vh - 78px);">
  <img src="/assets/saga-mark-gradient.png" alt="" style="position:absolute;width:420px;height:420px;right:-90px;bottom:-130px;opacity:0.14;pointer-events:none;">
  <div style="max-width:1140px;margin:0 auto;position:relative;z-index:2;display:flex;gap:64px;align-items:center;flex-wrap:wrap;">
    <div style="flex:1;min-width:300px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;color:#9FD3BF;margin-bottom:18px;">Get in touch</div>
      <h2 style="font-family:'Source Serif 4',serif;font-weight:900;font-size:54px;line-height:1.02;letter-spacing:-0.03em;margin:0 0 22px;text-wrap:balance;">Let's work together.</h2>
      <p style="font-size:18px;line-height:1.55;color:#fff;margin:0 0 30px;max-width:440px;">Tell me about your challenge, and I'll get back to you within 24 hours.</p>
      <div style="display:flex;flex-direction:column;gap:14px;font-family:'JetBrains Mono',monospace;font-size:15px;">
        <div style="display:flex;gap:14px;align-items:center;"><span style="color:#9FD3BF;font-size:11px;letter-spacing:0.14em;width:80px;">LINKEDIN</span><a class="nl" href="https://www.linkedin.com/in/jesseliv">linkedin.com/in/jesseliv</a></div>
      </div>
    </div>
    <form id="cform" style="flex:1;min-width:320px;background:rgba(255,255,255,0.04);border:1px solid rgba(191,224,210,0.24);border-radius:18px;padding:30px 32px;">
      <input type="hidden" name="access_key" value="fb8dd8b0-9dd9-4c39-a1e5-51f00ee8fe7d">
      <input type="hidden" name="subject" value="New message from jesselivingston.com">
      <input type="hidden" name="from_name" value="jesselivingston.com">
      <input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" style="display:none;">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div><label style="display:block;font-size:12px;color:#fff;margin-bottom:6px;">Name</label><input name="name" type="text" required style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(191,224,210,0.28);border-radius:10px;padding:12px 14px;color:#EDE7DA;font-family:'DM Sans',sans-serif;font-size:15px;"></div>
        <div><label style="display:block;font-size:12px;color:#fff;margin-bottom:6px;">Email</label><input name="email" type="email" required style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(191,224,210,0.28);border-radius:10px;padding:12px 14px;color:#EDE7DA;font-family:'DM Sans',sans-serif;font-size:15px;"></div>
        <div><label style="display:block;font-size:12px;color:#fff;margin-bottom:6px;">Tell me more...</label><textarea name="message" rows="3" required style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(191,224,210,0.28);border-radius:10px;padding:12px 14px;color:#EDE7DA;font-family:'DM Sans',sans-serif;font-size:15px;resize:vertical;"></textarea></div>
        <button type="submit" class="btn-l" style="text-align:center;background:#EDE7DA;color:#123A33;padding:13px;border-radius:999px;font-weight:600;font-size:15px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;">Send message →</button>
        <div id="cform-status" style="font-size:13.5px;color:#9FD3BF;min-height:18px;"></div>
      </div>
    </form>
  </div>
</section>

<!-- thin cream separator between the forest section and the footer -->
<div style="height:6px;background:#F4EFE4;"></div>

<!-- FOOTER (same on every page) -->
<footer style="background:#0d2a24;color:#fff;padding:26px 40px;">
  <div style="max-width:1140px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-size:13px;">
    <span style="font-family:'Source Serif 4',serif;font-weight:900;font-size:16px;color:#EDE7DA;">Jesse Livingston</span>
    <span style="font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;">© 2026 · UX Research &amp; Strategy</span>
  </div>
</footer>

<script>
/* Contact form → Web3Forms */
(function(){
  var form = document.getElementById('cform');
  if(!form) return;
  var status = document.getElementById('cform-status');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    status.style.color = '#9FD3BF';
    status.textContent = 'Sending…';
    fetch('https://api.web3forms.com/submit', { method:'POST', body: new FormData(form) })
      .then(function(r){ return r.json(); })
      .then(function(j){
        if(j.success){ form.reset(); status.textContent = "Thanks. I'll get back to you within 24 hours."; }
        else { status.style.color = '#F0A58F'; status.textContent = 'Something went wrong. Please try again in a moment.'; }
      })
      .catch(function(){ status.style.color = '#F0A58F'; status.textContent = 'Something went wrong. Please try again in a moment.'; });
  });
})();
</script>

</body>
